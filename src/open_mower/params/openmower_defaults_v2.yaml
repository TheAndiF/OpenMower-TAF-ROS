ll:
  bind_ip: "172.16.78.1"

  services:
    sound:
      language: "en"
      volume: -1
    gps:
      baud_rate: 921600
      protocol: "UBX"
      datum_height: 0
      absolute_coords: true
    imu:
      axis_config: "+X-Y-Z"
    power:
      battery_critical_high_voltage: -1
      charge_critical_high_voltage: -1
      charge_critical_high_current: -1

xbot_positioning:
  max_gps_accuracy: 0.2
  debug: false

ntrip_client:
  reconnect_attempt_max: 5
  reconnect_attempt_wait_seconds: 99999

mower_logic:
  automatic_mode: 0
  docking_approach_distance: 1.5
  docking_extra_time: 0
  docking_retry_count: 4
  docking_redock: false
  outline_overlap_count: 0
  mow_angle_offset: 0
  mow_angle_offset_is_absolute: false
  mow_angle_increment: 0
  gps_wait_time: 10.0
  gps_timeout: 10.0
  rain_mode: 0
  rain_delay_minutes: 30
  rain_check_seconds: 20
  cu_rain_threshold: -1
  undock_angled_distance: 0.0
  undock_angle: 0.0
  undock_fixed_angle: true
  undock_use_curve: true
  emergency_lift_period: -1
  emergency_tilt_period: -1
  ignore_charging_current: false
  # Calculated mowing-load factor. This currently only computes and publishes the factor;
  # it does not yet influence the driving speed.
  mow_load_factor_enabled: false
  mow_load_factor_min: 0.40
  mow_load_current_start: 0.75
  mow_load_current_end: 1.25
  mow_load_motor_temp_start: 55.0
  mow_load_motor_temp_end: 68.0
  mow_load_esc_temp_start: 60.0
  mow_load_esc_temp_end: 78.0
  mow_load_factor_smoothing_enabled: true
  mow_load_factor_smoothing_down_alpha: 0.50
  mow_load_factor_smoothing_up_alpha: 0.10
  mow_load_status_publish_period: 0.50

xbot_monitoring:
  external_mqtt_enable: false
  statustransition_log_mqtt_default_limit: 20
