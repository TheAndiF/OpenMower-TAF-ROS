name: TAF Release Build ROS

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, e.g. XX2026-06-01-test1 or MA2026-06-01"
        required: true
        type: string
      source_ref:
        description: "Git ref to build, e.g. main, tag or commit SHA"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build_ros_image:
    name: Build and push ROS Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          submodules: recursive

      - name: Show ROS image build info
        run: |
          echo "Release version: ${{ inputs.release_version }}"
          echo "Source ref:      ${{ inputs.source_ref }}"
          echo "ROS image latest:    ghcr.io/theandif/openmower-taf-ros:taf_latest"
          echo "ROS image versioned: ghcr.io/theandif/openmower-taf-ros:${{ inputs.release_version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The ROS runtime is published as a container image.
      # taf_latest is the rolling robot/update tag.
      # release_version is the immutable tag for reproducible deployments.
      - name: Build and push ROS Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=registry,ref=ghcr.io/theandif/openmower-taf-ros:taf_buildcache
          cache-to: type=registry,ref=ghcr.io/theandif/openmower-taf-ros:taf_buildcache,mode=max
          tags: |
            ghcr.io/theandif/openmower-taf-ros:taf_latest
            ghcr.io/theandif/openmower-taf-ros:${{ inputs.release_version }}
