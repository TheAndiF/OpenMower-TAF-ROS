name: TAF Release Build ROS

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, e.g. MA2026-06-01 or XX2026-06-01-test3"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build_ros_release:
    name: Build ROS release image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ROS ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          submodules: recursive

      - name: Show release context
        run: |
          echo "Release version: ${{ inputs.release_version }}"
          echo "Source ref:      ${{ inputs.source_ref }}"
          echo "Repository:      ${{ github.repository }}"
          git rev-parse HEAD

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ROS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/theandif/openmower-taf-ros:${{ inputs.release_version }}
            ghcr.io/theandif/openmower-taf-ros:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
